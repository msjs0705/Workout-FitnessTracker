<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juu's Workout· Progress</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #F4F2EC;
            --card-navy: #1B2128;
            --accent-amber: #E2722A;
            --accent-teal: #1F9E83;
            --text-dark: #1B2128;
            --text-muted: #6C727A;
            --text-white: #FFFFFF;
            --text-white-muted: rgba(255, 255, 255, 0.55);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 10px;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-premium: 0 10px 30px -10px rgba(27, 33, 40, 0.08), 0 1px 3px rgba(27, 33, 40, 0.02);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-body);
            color: var(--text-dark);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 4px;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logo .owner {
            color: var(--accent-amber);
        }

        .logo .wordmark {
            color: var(--text-dark);
        }

        .refresh-status {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-teal);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(31, 158, 131, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0);
            }
        }

        /* MAIN STATUS CARD */
        .status-card {
            background-color: var(--card-navy);
            border-radius: var(--border-radius-lg);
            padding: 32px 28px;
            color: var(--text-white);
            box-shadow: 0 20px 40px -15px rgba(27, 33, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(226, 114, 42, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .streak-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }

        .streak-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .streak-value {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .metric-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 0;
        }

        .metric-icon-wrapper {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .metric-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .metric-icon-workout { stroke: var(--accent-amber); }
        .metric-icon-cardio { stroke: var(--accent-teal); }
        .metric-icon-weight { stroke: #38BDF8; }

        .metric-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white-muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-white);
            line-height: 1.4;
        }

        .metric-sub {
            font-size: 13px;
            color: var(--text-white-muted);
        }

        .recovery-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .recovery-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recovery-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .recovery-legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .legend-dot.ready { background-color: #10B981; }
        .legend-dot.recovering { background-color: #F87171; }

        .recovery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .muscle-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--border-radius-sm);
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .muscle-item:hover {
            background-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .muscle-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-white);
        }

        .muscle-status {
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .muscle-status.ready {
            color: #10B981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .muscle-status.recovering {
            color: #F87171;
            background-color: rgba(248, 113, 113, 0.1);
        }

        .chart-card {
            background-color: #FFFFFF;
            border-radius: var(--border-radius-lg);
            padding: 28px 24px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(27, 33, 40, 0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition-smooth);
        }

        .chart-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px -10px rgba(27, 33, 40, 0.12);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(27, 33, 40, 0.05);
            padding-bottom: 12px;
        }

        .chart-title {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
            width: 100%;
        }

        .cardio-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 10px;
            padding: 20px;
        }

        .cardio-placeholder-icon {
            font-size: 32px;
        }

        .cardio-placeholder-text {
            font-size: 14px;
            font-weight: 500;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(27, 33, 40, 0.1);
            border-top: 4px solid var(--accent-amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 500;
            color: var(--text-dark);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #EF4444;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .recovery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .status-card {
                padding: 24px 18px;
            }
            .streak-value {
                font-size: 26px;
            }
            .logo {
                font-size: 20px;
            }
            .chart-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>

    <!-- MAIN FIREBASE MODULE JS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPLPcTZj7qartfiWr_0LHuiC2V3NxyjxY",
            authDomain: "workout-94d16.firebaseapp.com",
            projectId: "workout-94d16",
            appId: "1:788877407686:web:e8d9d90223cae4e9146ec7"
        };
        const ownerUid = "HRdHV90GEEQkHmBV3D2QO8VESDi1";

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) { console.error("Firebase Init Error:", e); }

        let weightChartInstance = null;
        let lastUpdatedTime = null;

        function getLocalDateStr(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function getDaysDifference(d1Str, d2Str) {
            if (!d1Str || !d2Str) return 0;
            const [y1, m1, d1] = d1Str.split('-').map(Number);
            const [y2, m2, d2] = d2Str.split('-').map(Number);
            return Math.round((new Date(y1, m1 - 1, d1) - new Date(y2, m2 - 1, d2)) / 86400000);
        }

        function formatDaysAgo(daysDiff) {
            if (daysDiff === 0) return "today";
            if (daysDiff === 1) return "yesterday";
            return `${daysDiff} days ago`;
        }

        function formatPace(durationMin, distanceKm) {
            if (!distanceKm || distanceKm <= 0) return "0:00/km";
            const decimalPace = durationMin / distanceKm;
            const mins = Math.floor(decimalPace);
            const secs = Math.round((decimalPace - mins) * 60);
            return `${mins}:${String(secs).padStart(2, '0')}/km`;
        }

        async function updateDashboard() {
            if (!db) return;
            try {
                const [wSnap, cSnap, bwSnap, rSnap, pSnap] = await Promise.all([
                    getDocs(collection(db, "users", ownerUid, "workouts")),
                    getDocs(collection(db, "users", ownerUid, "cardio")),
                    getDocs(collection(db, "users", ownerUid, "bodyweight")),
                    getDocs(collection(db, "users", ownerUid, "restdays")),
                    getDocs(collection(db, "users", ownerUid, "photoslots"))
                ]);

                const workouts = wSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const cardio = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const bodyweight = bwSnap.docs.map(d => ({ dateStr: d.id, weight: parseFloat(d.data().weight) || 0 }));
                const restDays = rSnap.docs.map(d => d.id);
                const photos = pSnap.docs.map(d => ({ ...d.data() })).filter(p => p.base64).sort((a,b) => (b.uploadedAt?.seconds||0) - (a.uploadedAt?.seconds||0));

                processDashboardData(workouts, cardio, bodyweight, restDays, photos[0] || null, getLocalDateStr());

                lastUpdatedTime = new Date();
                updateTimeElapsed();
                document.getElementById("loader").style.display = 'none';
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById("loader").style.display = 'none';
            }
        }

        function processDashboardData(workouts, cardio, bodyweight, restDays, latestPhoto, todayStr) {
            // Helper to safely update DOM elements
            const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
            
            // Safety sorting: ensures missing dates don't crash the script
            workouts.sort((a, b) => (b.dateStr || "").localeCompare(a.dateStr || ""));
            cardio.sort((a, b) => (b.dateStr || "").localeCompare(a.dateStr || ""));
            
            // 1. STREAK
            // Rest days count as "active" days for streak purposes (already included below).
            // FIX: previously this always started counting from *today*, so if today has
            // no logged activity yet, the loop exited immediately and the whole streak
            // showed as 0 -- even if yesterday extended a 12-13 day streak.
            // Now: if today isn't logged yet, start the count from yesterday instead,
            // so an ongoing streak isn't wiped out just because today hasn't happened yet.
            const activityDates = new Set([...workouts.map(w => w.dateStr), ...cardio.map(c => c.dateStr), ...restDays]);
            let streak = 0;
            let check = new Date();
            if (!activityDates.has(getLocalDateStr(check))) {
                check.setDate(check.getDate() - 1);
            }
            while (activityDates.has(getLocalDateStr(check))) {
                streak++;
                check.setDate(check.getDate() - 1);
            }
            setVal("streak-display", `${streak} day${streak===1?'':'s'}${streak>3?' 🔥':''}`);

            // 2. LAST WORKOUT (Displays muscles and days ago)
            if (workouts.length > 0) {
                const w = workouts[0];
                const muscles = (w.muscles || []).join(" & ");
                setVal("workout-display", `${muscles || "Workout"} · ${getDaysDifference(todayStr, w.dateStr)} days ago`);
            } else { setVal("workout-display", "No workouts logged"); }

            // 3. LAST RUN (Displays distance and pace)
            const runs = cardio.filter(c => (c.cardioType || "").toLowerCase().includes("run"));
            if (runs.length > 0) {
                setVal("run-display", `${runs[0].distanceKm || 0} km · ${formatPace(runs[0].durationMin, runs[0].distanceKm)} · ${getDaysDifference(todayStr, runs[0].dateStr)} days ago`);
            } else { setVal("run-display", "No runs logged yet"); }

            // 4. WEIGHT
            const sortedBodyweight = [...bodyweight].sort((a,b) => a.dateStr.localeCompare(b.dateStr));
            if (sortedBodyweight.length > 0) {
                const latestW = sortedBodyweight[sortedBodyweight.length - 1];
                setVal("weight-display", `${latestW.weight.toFixed(1)} kg`);

                // FIX: renderWeightChart() was defined but never called anywhere,
                // so the Weight chart card was always empty. Wire it up here.
                const labels = sortedBodyweight.map(b => {
                    const [y, m, d] = b.dateStr.split('-');
                    return `${m}/${d}`;
                });
                const data = sortedBodyweight.map(b => b.weight);
                renderWeightChart(labels, data);

                const minW = Math.min(...data).toFixed(1);
                const maxW = Math.max(...data).toFixed(1);
                setVal("weight-chart-sub", minW === maxW ? `${latestW.weight.toFixed(1)} kg` : `${minW}–${maxW} kg`);
            } else {
                setVal("weight-display", "— kg");
                setVal("weight-chart-sub", "— kg");
            }

            // 5. PR NOTIFICATION
            const prSection = document.getElementById("pr-notification-section");
            const latestDate = workouts.length > 0 ? workouts[0].dateStr : null;
            if (prSection && latestDate) {
                const prs = workouts.filter(w => w.dateStr === latestDate).flatMap(w => w.exercises || []);
                if (prs.length > 0) {
                    prSection.style.display = "flex";
                    document.getElementById("pr-list-container").innerHTML = prs.map(p => 
                        `<div style="display:flex; justify-content:space-between;"><span>${p.name}</span><span>${Math.max(...p.sets.map(s=>Number(s.weight)))} kg</span></div>`
                    ).join("");
                } else { prSection.style.display = "none"; }
            }

            // 6. PHOTO
            const photoCard = document.getElementById("photo-card");
            if (photoCard && latestPhoto) {
                photoCard.style.display = "block";
                const gymPhoto = document.getElementById("gym-photo");
                if (gymPhoto) gymPhoto.src = latestPhoto.base64.startsWith("data:") ? latestPhoto.base64 : "data:image/jpeg;base64," + latestPhoto.base64;
            }
        }

        function renderWeightChart(labels, data) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (weightChartInstance) weightChartInstance.destroy();
            weightChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ data: data, borderColor: '#E2722A', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateTimeElapsed() {
            const el = document.getElementById("update-time-text");
            if (el) el.innerText = "Updated just now";
        }

        document.getElementById("send-comment-btn")?.addEventListener("click", async () => {
            const text = document.getElementById("partner-comment-input").value;
            if (text) {
                await setDoc(doc(db, "users", ownerUid, "meta", "partnerComment"), { text, timestamp: new Date().toISOString() });
                alert("Sent!");
            }
        });

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
