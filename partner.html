<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juu's Workout· Progress</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #F4F2EC;
            --card-navy: #1B2128;
            --accent-amber: #E2722A;
            --accent-teal: #1F9E83;
            --text-dark: #1B2128;
            --text-muted: #6C727A;
            --text-white: #FFFFFF;
            --text-white-muted: rgba(255, 255, 255, 0.55);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 10px;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-premium: 0 10px 30px -10px rgba(27, 33, 40, 0.08), 0 1px 3px rgba(27, 33, 40, 0.02);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-body);
            color: var(--text-dark);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 4px;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logo .owner {
            color: var(--accent-amber);
        }

        .logo .wordmark {
            color: var(--text-dark);
        }

        .refresh-status {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-teal);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(31, 158, 131, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0);
            }
        }

        /* MAIN STATUS CARD */
        .status-card {
            background-color: var(--card-navy);
            border-radius: var(--border-radius-lg);
            padding: 32px 28px;
            color: var(--text-white);
            box-shadow: 0 20px 40px -15px rgba(27, 33, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background glow for aesthetics */
        .status-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(226, 114, 42, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .streak-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }

        .streak-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .streak-value {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Status metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .metric-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 0;
        }

        .metric-icon-wrapper {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .metric-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .metric-icon-workout { stroke: var(--accent-amber); }
        .metric-icon-cardio { stroke: var(--accent-teal); }
        .metric-icon-weight { stroke: #38BDF8; }

        .metric-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white-muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-white);
            line-height: 1.4;
        }

        .metric-sub {
            font-size: 13px;
            color: var(--text-white-muted);
        }

        /* Muscle Recovery Section */
        .recovery-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .recovery-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recovery-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .recovery-legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .legend-dot.ready { background-color: #10B981; }
        .legend-dot.recovering { background-color: #F87171; }

        .recovery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .muscle-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--border-radius-sm);
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .muscle-item:hover {
            background-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .muscle-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-white);
        }

        .muscle-status {
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .muscle-status.ready {
            color: #10B981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .muscle-status.recovering {
            color: #F87171;
            background-color: rgba(248, 113, 113, 0.1);
        }

        /* CHARTS SECTION */
        .chart-card {
            background-color: #FFFFFF;
            border-radius: var(--border-radius-lg);
            padding: 28px 24px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(27, 33, 40, 0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition-smooth);
        }

        .chart-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px -10px rgba(27, 33, 40, 0.12);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(27, 33, 40, 0.05);
            padding-bottom: 12px;
        }

        .chart-title {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
            width: 100%;
        }

        /* Placeholder for Empty Cardio */
        .cardio-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 10px;
            padding: 20px;
        }

        .cardio-placeholder-icon {
            font-size: 32px;
        }

        .cardio-placeholder-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* FULL PAGE LOADING SCREEN */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(27, 33, 40, 0.1);
            border-top: 4px solid var(--accent-amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 500;
            color: var(--text-dark);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ERROR TOAST */
        #error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #EF4444;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* RESPONSIVE LAYOUT adjustments */
        @media (max-width: 480px) {
            .recovery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .status-card {
                padding: 24px 18px;
            }
            .streak-value {
                font-size: 26px;
            }
            .logo {
                font-size: 20px;
            }
            .chart-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- MAIN FIREBASE MODULE JS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPLPcTZj7qartfiWr_0LHuiC2V3NxyjxY",
            authDomain: "workout-94d16.firebaseapp.com",
            projectId: "workout-94d16",
            appId: "1:788877407686:web:e8d9d90223cae4e9146ec7"
        };
        const ownerUid = "HRdHV90GEEQkHmBV3D2QO8VESDi1";

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            showError("Firebase configuration failed.");
        }

        let weightChartInstance = null;
        let lastUpdatedTime = null;

        function getLocalDateStr(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDaysDifference(d1Str, d2Str) {
            const [y1, m1, d1] = d1Str.split('-').map(Number);
            const [y2, m2, d2] = d2Str.split('-').map(Number);
            const date1 = new Date(y1, m1 - 1, d1);
            const date2 = new Date(y2, m2 - 1, d2);
            return Math.round((date1 - date2) / (1000 * 60 * 60 * 24));
        }

        function formatDaysAgo(daysDiff) {
            if (daysDiff === 0) return "today";
            if (daysDiff === 1) return "yesterday";
            return `${daysDiff} days ago`;
        }

        function formatPace(durationMin, distanceKm) {
            if (!distanceKm || distanceKm <= 0) return "0:00/km";
            const decimalPace = durationMin / distanceKm;
            const mins = Math.floor(decimalPace);
            const secs = Math.round((decimalPace - mins) * 60);
            return `${mins}:${String(secs).padStart(2, '0')}/km`;
        }

        function showError(msg) {
            const toast = document.getElementById("error-toast");
            document.getElementById("error-message").innerText = msg;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 6000);
        }

        async function updateDashboard() {
            if (!db) return;
            try {
                const [workoutsSnap, cardioSnap, weightSnap, restDaysSnap, photosSnap] = await Promise.all([
                    getDocs(collection(db, "users", ownerUid, "workouts")),
                    getDocs(collection(db, "users", ownerUid, "cardio")),
                    getDocs(collection(db, "users", ownerUid, "bodyweight")),
                    getDocs(collection(db, "users", ownerUid, "restdays")),
                    getDocs(collection(db, "users", ownerUid, "photoslots"))
                ]);

                const workouts = workoutsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const cardio = cardioSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const bodyweight = weightSnap.docs.map(doc => ({
                    dateStr: doc.id, weight: parseFloat(doc.data().weight) || parseFloat(doc.data().value)
                }));
                const restDays = restDaysSnap.docs.map(doc => doc.id);

                const photos = photosSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(p => p.base64);
                photos.sort((a, b) => (b.uploadedAt?.seconds || 0) - (a.uploadedAt?.seconds || 0));
                const latestPhoto = photos.length > 0 ? photos[0] : null;

                const todayStr = getLocalDateStr();
                processDashboardData(workouts, cardio, bodyweight, restDays, latestPhoto, todayStr);

                lastUpdatedTime = new Date();
                updateTimeElapsed();
                
                const loader = document.getElementById("loader");
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            } catch (err) {
                console.error("Firestore Fetch Error:", err);
                showError("Could not refresh data. Check connection.");
                const loader = document.getElementById("loader");
                if (loader) loader.style.display = 'none';
            }
        }

        function processDashboardData(workouts, cardio, bodyweight, restDays, latestPhoto, todayStr) {
            workouts.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            cardio.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            bodyweight.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            restDays.sort((a, b) => b.localeCompare(a));

            // STREAK
            const activityDatesSet = new Set();
            workouts.forEach(w => { if (w.dateStr) activityDatesSet.add(w.dateStr); });
            cardio.forEach(c => { if (c.dateStr) activityDatesSet.add(c.dateStr); });
            restDays.forEach(d => { if (d) activityDatesSet.add(d); });

            const activityDates = Array.from(activityDatesSet).sort((a, b) => b.localeCompare(a));
            let streak = 0;
            if (activityDates.length > 0) {
                const latestActivityDate = activityDates[0];
                const daysSinceLatest = getDaysDifference(todayStr, latestActivityDate);
                if (daysSinceLatest <= 1) {
                    streak = 1;
                    const [ly, lm, ld] = latestActivityDate.split('-').map(Number);
                    let checkDate = new Date(ly, lm - 1, ld);
                    while (true) {
                        checkDate.setDate(checkDate.getDate() - 1);
                        const checkDateStr = getLocalDateStr(checkDate);
                        if (activityDatesSet.has(checkDateStr)) streak++;
                        else break;
                    }
                }
            }
            document.getElementById("streak-display").innerText = `${streak} ${streak === 1 ? 'day' : 'days'}${streak > 3 ? ' 🔥' : ''}`;

            // LAST WORKOUT
            const workoutDisplay = document.getElementById("workout-display");
            const latestRestDayDate = restDays.length > 0 ? restDays[0] : null;
            const latestWorkoutDate = workouts.length > 0 ? workouts[0].dateStr : null;
            const latestCardioDate = cardio.length > 0 ? cardio[0].dateStr : null;
            
            const isRestDayMostRecent = latestRestDayDate && 
                (!latestWorkoutDate || latestRestDayDate >= latestWorkoutDate) && 
                (!latestCardioDate || latestRestDayDate >= latestCardioDate);
                
            if (workouts.length > 0) {
                const latestWorkout = workouts[0];
                const daysAgo = getDaysDifference(todayStr, latestWorkout.dateStr);
                if (daysAgo >= 3) {
                    workoutDisplay.innerHTML = isRestDayMostRecent ? `<span class="workout-rest-text">Rest day 🛌</span>` : `<span class="workout-rest-text">Taking a rest 😴</span>`;
                } else {
                    const musclesTrained = Array.isArray(latestWorkout.muscles) && latestWorkout.muscles.length > 0 ? latestWorkout.muscles.join(" & ") : "General Workout";
                    workoutDisplay.innerText = `${musclesTrained} · ${formatDaysAgo(daysAgo)}`;
                }
            } else {
                workoutDisplay.innerHTML = isRestDayMostRecent ? `<span class="workout-rest-text">Rest day 🛌</span>` : "No workouts logged";
            }

            // LAST RUN
            const runDisplay = document.getElementById("run-display");
            const runningWorkouts = cardio.filter(c => !c.cardioType || c.cardioType.toLowerCase().includes('run'));
            if (runningWorkouts.length > 0) {
                const latestRun = runningWorkouts[0];
                const daysAgo = getDaysDifference(todayStr, latestRun.dateStr);
                const distanceVal = parseFloat(latestRun.distanceKm) || 0;
                const durationVal = parseFloat(latestRun.durationMin) || 0;
                runDisplay.innerText = `${distanceVal.toFixed(1)} km · ${formatPace(durationVal, distanceVal)} · ${formatDaysAgo(daysAgo)}`;
            } else {
                runDisplay.innerText = "No runs logged yet";
            }

            // WEIGHT
            const weightDisplay = document.getElementById("weight-display");
            const weightChartSub = document.getElementById("weight-chart-sub");
            if (bodyweight.length > 0) {
                const currentWeightVal = bodyweight[0].weight;
                const target30DaysAgoDate = new Date(bodyweight[0].dateStr + 'T00:00:00');
                target30DaysAgoDate.setDate(target30DaysAgoDate.getDate() - 30);
                const target30DaysAgoStr = getLocalDateStr(target30DaysAgoDate);
                
                let weight30DaysAgo = null;
                let minDiff = Infinity;
                bodyweight.forEach(w => {
                    const diff = Math.abs(getDaysDifference(w.dateStr, target30DaysAgoStr));
                    if (diff < minDiff) { minDiff = diff; weight30DaysAgo = w.weight; }
                });

                let diffText = "";
                if (weight30DaysAgo !== null) {
                    const diff = currentWeightVal - weight30DaysAgo;
                    if (diff > 0) diffText = ` · +${diff.toFixed(1)} kg this month`;
                    else if (diff < 0) diffText = ` · −${Math.abs(diff).toFixed(1)} kg this month`;
                    else diffText = ` · 0.0 kg this month`;
                }
                weightDisplay.innerText = `${currentWeightVal.toFixed(1)} kg${diffText}`;
                if (weightChartSub) weightChartSub.innerText = `${currentWeightVal.toFixed(1)} kg`;
            } else {
                weightDisplay.innerText = "No bodyweight logged";
                if (weightChartSub) weightChartSub.innerText = "— kg";
            }

            // WEIGHT CHART
            const weightChartData = [...bodyweight].slice(0, 60).reverse();
            const weightLabels = weightChartData.map(w => {
                const [y, m, d] = w.dateStr.split('-').map(Number);
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                return `${months[m - 1]} ${d}`;
            });
            const weightValues = weightChartData.map(w => w.weight);
            renderWeightChart(weightLabels, weightValues);

            // PR NOTIFICATION (Targets Most Recent Workout)
            const prs = {};
            const reversedWorkouts = [...workouts].reverse();
            for (const w of reversedWorkouts) {
                for (const e of (w.exercises || [])) {
                    for (const s of (e.sets || [])) {
                        const weight = Number(s.weight) || 0, reps = Number(s.reps) || 0;
                        if (weight <= 0 || reps <= 0) continue;
                        const est1rm = weight * (1 + reps/30);
                        const cur = prs[e.exerciseId];
                        if (!cur || weight > cur.maxWeight) {
                            prs[e.exerciseId] = {
                                exerciseName: e.name, maxWeight: cur ? Math.max(cur.maxWeight, weight) : weight,
                                est1rm: cur ? Math.max(cur.est1rm, est1rm) : est1rm, dateStr: w.dateStr
                            };
                        } else if (est1rm > cur.est1rm) {
                            cur.est1rm = est1rm;
                        }
                    }
                }
            }

            const prSection = document.getElementById("pr-notification-section");
            const recentPRs = latestWorkoutDate ? Object.values(prs).filter(pr => pr.dateStr === latestWorkoutDate) : [];
            
            if (prSection) {
                if (recentPRs.length > 0) {
                    prSection.style.display = "flex";
                    document.getElementById("pr-header-text").textContent = latestWorkoutDate === todayStr ? "New PR Hit Today!" : "New PR in Last Session!";
                    const prList = recentPRs.map(pr => `
                        <div style="background:rgba(255,255,255,0.04); padding:10px 14px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:500; font-size:14px; color:var(--text-white);">${pr.exerciseName}</span>
                            <span style="color:var(--accent-amber); font-family:var(--font-heading); font-size:15px; font-weight:700;">${pr.maxWeight} kg</span>
                        </div>`).join("");
                    document.getElementById("pr-list-container").innerHTML = prList;
                } else {
                    prSection.style.display = "none";
                    document.getElementById("pr-list-container").innerHTML = "";
                }
            }

            // GYM PHOTO
            const photoCard = document.getElementById("photo-card");
            const gymPhoto = document.getElementById("gym-photo");
            const photoLabel = document.getElementById("photo-label");
            
            if (photoCard && latestPhoto) {
                photoCard.style.display = "block";
                const daysDiff = getDaysDifference(todayStr, latestPhoto.dateStr);
                let labelText = daysDiff === 0 ? "📸 Today" : (daysDiff === 1 ? "📸 Yesterday" : `📸 ${daysDiff} days ago`);
                photoLabel.innerText = labelText;
                setTimeout(() => {
                    gymPhoto.src = latestPhoto.base64.startsWith("data:") ? latestPhoto.base64 : "data:image/jpeg;base64," + latestPhoto.base64;
                }, 100);
            } else if (photoCard) {
                photoCard.style.display = "none";
                if(gymPhoto) gymPhoto.src = "";
            }
        }

        function renderWeightChart(labels, data) {
            const canvas = document.getElementById('weightChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            if (weightChartInstance) weightChartInstance.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, 'rgba(226, 114, 42, 0.2)');
            gradient.addColorStop(1, 'rgba(226, 114, 42, 0.00)');

            weightChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data, borderColor: '#E2722A', borderWidth: 2.5, backgroundColor: gradient,
                        fill: true, tension: 0.35, pointRadius: 0, pointHoverRadius: 5,
                        pointHoverBackgroundColor: '#E2722A', pointHoverBorderColor: '#FFFFFF', pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1B2128', displayColors: false, callbacks: { label: (c) => `${c.parsed.y.toFixed(1)} kg` } } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 10 }, color: '#6C727A', maxTicksLimit: 6 } },
                        y: { grid: { color: 'rgba(27, 33, 40, 0.04)' }, ticks: { font: { family: 'Inter', size: 10 }, color: '#6C727A', maxTicksLimit: 5 } }
                    }
                }
            });
        }

        function updateTimeElapsed() {
            const textEl = document.getElementById("update-time-text");
            if (!lastUpdatedTime) { textEl.innerText = "Connecting..."; return; }
            const diffMins = Math.floor((new Date() - lastUpdatedTime) / 60000);
            textEl.innerText = diffMins < 1 ? "Updated just now" : (diffMins === 1 ? "Updated 1 min ago" : `Updated ${diffMins} mins ago`);
        }

        // COMMENT SUBMISSION
        const sendBtn = document.getElementById("send-comment-btn");
        if (sendBtn) {
            sendBtn.addEventListener("click", async () => {
                const input = document.getElementById("partner-comment-input");
                const text = input.value.trim();
                if (!text) return;

                const originalText = sendBtn.innerText;
                sendBtn.innerText = "Sending...";
                sendBtn.disabled = true;

                try {
                    await setDoc(doc(db, "users", ownerUid, "meta", "partnerComment"), { text: text, timestamp: new Date().toISOString() });
                    input.value = "";
                    sendBtn.innerText = "Sent! ✓";
                    setTimeout(() => { sendBtn.innerText = originalText; sendBtn.disabled = false; }, 2500);
                } catch (err) {
                    showError("Failed to send comment.");
                    sendBtn.innerText = originalText;
                    sendBtn.disabled = false;
                }
            });
        }

        updateDashboard();
        setInterval(updateDashboard, 180000);
        setInterval(updateTimeElapsed, 10000);
    </script>
</body>
</html>
