<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juu's Workout· Progress</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #F4F2EC;
            --card-navy: #1B2128;
            --accent-amber: #E2722A;
            --accent-teal: #1F9E83;
            --text-dark: #1B2128;
            --text-muted: #6C727A;
            --text-white: #FFFFFF;
            --text-white-muted: rgba(255, 255, 255, 0.55);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 10px;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-premium: 0 10px 30px -10px rgba(27, 33, 40, 0.08), 0 1px 3px rgba(27, 33, 40, 0.02);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-body);
            color: var(--text-dark);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 4px;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logo .owner {
            color: var(--accent-amber);
        }

        .logo .wordmark {
            color: var(--text-dark);
        }

        .refresh-status {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-teal);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(31, 158, 131, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(31, 158, 131, 0);
            }
        }

        /* MAIN STATUS CARD */
        .status-card {
            background-color: var(--card-navy);
            border-radius: var(--border-radius-lg);
            padding: 32px 28px;
            color: var(--text-white);
            box-shadow: 0 20px 40px -15px rgba(27, 33, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background glow for aesthetics */
        .status-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(226, 114, 42, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .streak-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }

        .streak-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .streak-value {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Status metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .metric-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 0;
        }

        .metric-icon-wrapper {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .metric-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .metric-icon-workout { stroke: var(--accent-amber); }
        .metric-icon-cardio { stroke: var(--accent-teal); }
        .metric-icon-weight { stroke: #38BDF8; }

        .metric-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white-muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-white);
            line-height: 1.4;
        }

        .metric-sub {
            font-size: 13px;
            color: var(--text-white-muted);
        }

        /* Muscle Recovery Section */
        .recovery-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .recovery-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recovery-title {
            font-family: var(--font-heading);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-white-muted);
            font-weight: 500;
        }

        .recovery-legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .legend-dot.ready { background-color: #10B981; }
        .legend-dot.recovering { background-color: #F87171; }

        .recovery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .muscle-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--border-radius-sm);
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .muscle-item:hover {
            background-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .muscle-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-white);
        }

        .muscle-status {
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .muscle-status.ready {
            color: #10B981;
            background-color: rgba(16, 185, 129, 0.1);
        }

        .muscle-status.recovering {
            color: #F87171;
            background-color: rgba(248, 113, 113, 0.1);
        }

        /* CHARTS SECTION */
        .chart-card {
            background-color: #FFFFFF;
            border-radius: var(--border-radius-lg);
            padding: 28px 24px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(27, 33, 40, 0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition-smooth);
        }

        .chart-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px -10px rgba(27, 33, 40, 0.12);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(27, 33, 40, 0.05);
            padding-bottom: 12px;
        }

        .chart-title {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
            width: 100%;
        }

        /* Placeholder for Empty Cardio */
        .cardio-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 10px;
            padding: 20px;
        }

        .cardio-placeholder-icon {
            font-size: 32px;
        }

        .cardio-placeholder-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* FULL PAGE LOADING SCREEN */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(27, 33, 40, 0.1);
            border-top: 4px solid var(--accent-amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 500;
            color: var(--text-dark);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ERROR TOAST */
        #error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #EF4444;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* RESPONSIVE LAYOUT adjustments */
        @media (max-width: 480px) {
            .recovery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .status-card {
                padding: 24px 18px;
            }
            .streak-value {
                font-size: 26px;
            }
            .logo {
                font-size: 20px;
            }
            .chart-card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Full page loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Juu's stats...</div>
    </div>

    <!-- Error Toast -->
    <div id="error-toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="error-message">Failed to connect to Firebase.</span>
    </div>

    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <span class="owner">Juu</span>
                <span class="wordmark">Ironlog</span>
            </div>
            <div class="refresh-status">
                <span class="status-dot"></span>
                <span id="update-time-text">Loading...</span>
            </div>
        </header>

        <!-- GYM PHOTO CARD -->
        <div id="photo-card" class="status-card" style="display: none; padding: 24px;">
            <div style="display: flex; flex-direction: column; gap: 14px; width: 100%;">
                <img id="gym-photo" alt="Gym Photo" loading="lazy" style="width: 100%; max-height: 320px; object-fit: cover; border-radius: 12px; border: 2px solid var(--accent-amber); display: block;" />
                <span id="photo-label" style="font-size: 13px; font-weight: 600; color: var(--text-white-muted); display: flex; align-items: center; gap: 6px; font-family: var(--font-body);"></span>
            </div>
        </div>

        <!-- CURRENT STATUS CARD -->
        <div class="status-card">
            <!-- Streak -->
            <div class="streak-section">
                <span class="streak-title">Current Streak</span>
                <span class="streak-value" id="streak-display">— days</span>
            </div>

            <!-- Metrics list -->
            <div class="metrics-grid">
                <!-- Last Trained -->
                <div class="metric-item">
                    <div class="metric-icon-wrapper">
                        <svg class="metric-icon-workout" viewBox="0 0 24 24">
                            <line x1="6" y1="12" x2="18" y2="12"></line>
                            <path d="M6.5 8a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"></path>
                            <path d="M17.5 8a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"></path>
                            <path d="M4 10v4"></path>
                            <path d="M20 10v4"></path>
                            <line x1="6" y1="8" x2="6" y2="16"></line>
                            <line x1="18" y1="8" x2="18" y2="16"></line>
                        </svg>
                    </div>
                    <div class="metric-details">

                <!-- Last Run -->
                <div class="metric-item">
                    <div class="metric-icon-wrapper">
                        <svg class="metric-icon-cardio" viewBox="0 0 24 24">

                            <path d="M12 12v3"></path>

                <!-- Weight -->
                <div class="metric-item">
                    <div class="metric-icon-wrapper">
                        <svg class="metric-icon-weight" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                            <line x1="15" y1="3" x2="15" y2="21"></line>

            <!-- Muscle Recovery Strip -->
            <div class="recovery-section">
                <div class="recovery-title-container">
                    <span class="recovery-title">Muscle Recovery</span>
                    <div class="recovery-legend">

                        <div class="legend-item"><span class="legend-dot recovering"></span><span>Recovering</span></div>

        <!-- WEIGHT TREND CHART -->
        <div class="chart-card">

                <canvas id="weightChart"></canvas>

        <!-- CARDIO CHART -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Running</span>
                <span class="chart-subtitle" id="cardio-chart-sub">— km this month</span>

    <!-- MAIN FIREBASE MODULE JS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // REAL CONFIG FOR FIRESTORE
        const firebaseConfig = {
            apiKey: "AIzaSyDPLPcTZj7qartfiWr_0LHuiC2V3NxyjxY",
            authDomain: "workout-94d16.firebaseapp.com",
            projectId: "workout-94d16",
            appId: "1:788877407686:web:e8d9d90223cae4e9146ec7"
        };
        const ownerUid = "HRdHV90GEEQkHmBV3D2QO8VESDi1";

        // Initialize Firebase
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            showError("Firebase configuration failed.");
        }

        // Global Chart instances
        let weightChartInstance = null;
        let cardioChartInstance = null;
        let lastUpdatedTime = null;

        // Date utils
        function getLocalDateStr(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDaysDifference(d1Str, d2Str) {
            const [y1, m1, d1] = d1Str.split('-').map(Number);
            const [y2, m2, d2] = d2Str.split('-').map(Number);
            const date1 = new Date(y1, m1 - 1, d1);
            const date2 = new Date(y2, m2 - 1, d2);
            const diffTime = date1 - date2;
            return Math.round(diffTime / (1000 * 60 * 60 * 24));
        }

        function formatDaysAgo(daysDiff) {
            if (daysDiff === 0) return "today";
            if (daysDiff === 1) return "yesterday";
            return `${daysDiff} days ago`;
        }

        // Pace helper
        function formatPace(durationMin, distanceKm) {
            if (!distanceKm || distanceKm <= 0) return "0:00/km";
            const decimalPace = durationMin / distanceKm;
            const mins = Math.floor(decimalPace);
            const secs = Math.round((decimalPace - mins) * 60);
            return `${mins}:${String(secs).padStart(2, '0')}/km`;
        }

        // Muscle match helper for recovery strip
        function matchesMuscle(muscleFromDb, targetMuscle) {
            if (!muscleFromDb) return false;
            const normDb = muscleFromDb.toLowerCase().trim();
            const normTarget = targetMuscle.toLowerCase().trim();
            
            if (normDb === normTarget) return true;
            if (normDb === normTarget + 's' || normTarget === normDb + 's') return true;
            
            if (normTarget === 'bicep' && normDb.includes('bicep')) return true;
            if (normTarget === 'tricep' && normDb.includes('tricep')) return true;
            if (normTarget === 'shoulder' && normDb.includes('shoulder')) return true;
            
            if (normTarget === 'legs' && (
                normDb.includes('leg') || 
                normDb.includes('quad') || 
                normDb.includes('hamstring') || 
                normDb.includes('calf') || 
                normDb.includes('calves') || 
                normDb.includes('glute')
            )) return true;
            
            if (normTarget === 'abs' && (
                normDb.includes('abs') || 
                normDb.includes('abdominal') || 
                normDb.includes('core') || 
                normDb.includes('oblique')
            )) return true;
            
            return false;
        }

        // Error Toast display
        function showError(msg) {
            const toast = document.getElementById("error-toast");
            document.getElementById("error-message").innerText = msg;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 6000);
        }

        // Core data fetching and rendering
        async function updateDashboard() {
            if (!db) return;
            try {
                // Fetch data in parallel
                const [workoutsSnap, cardioSnap, weightSnap, restDaysSnap, photosSnap] = await Promise.all([
                    getDocs(collection(db, "users", ownerUid, "workouts")),
                    getDocs(collection(db, "users", ownerUid, "cardio")),
                    getDocs(collection(db, "users", ownerUid, "bodyweight")),
                    getDocs(collection(db, "users", ownerUid, "restdays")),
                    getDocs(collection(db, "users", ownerUid, "photoslots"))
                ]);

                // Map docs
                const workouts = workoutsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const cardio = cardioSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const bodyweight = weightSnap.docs.map(doc => {
                    const weightVal = parseFloat(doc.data().weight) || parseFloat(doc.data().value); // handle possible variant field names
                    return {
                        dateStr: doc.id, // document ID is dateStr
                        weight: weightVal
                    };
                });
                const restDays = restDaysSnap.docs.map(doc => doc.id);

                const photos = photosSnap.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(p => p.base64);

                // Helper to safely parse dates for sorting
                const getUploadedAtDate = (uploadedAt) => {
                    if (!uploadedAt) return new Date(0);
                    if (typeof uploadedAt.toDate === 'function') return uploadedAt.toDate();
                    if (uploadedAt.seconds) return new Date(uploadedAt.seconds * 1000);
                    return new Date(uploadedAt);
                };

                photos.sort((a, b) => getUploadedAtDate(b.uploadedAt) - getUploadedAtDate(a.uploadedAt));
                const latestPhoto = photos.length > 0 ? photos[0] : null;

                // Render metrics and charts
                const todayStr = getLocalDateStr();
                processDashboardData(workouts, cardio, bodyweight, restDays, latestPhoto, todayStr);

                // Update timestamp
                lastUpdatedTime = new Date();
                updateTimeElapsed();
                
                // Hide loading screen on first load
                const loader = document.getElementById("loader");
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }
            } catch (err) {
                console.error("Firestore Fetch Error:", err);
                showError("Could not refresh data. Check connection.");
                // Hide loader anyway to show cached or UI template
                const loader = document.getElementById("loader");
                if (loader) loader.style.display = 'none';
            }
        }

        // Core calculations & UI population
        function processDashboardData(workouts, cardio, bodyweight, restDays, latestPhoto, todayStr) {
            // Sort arrays descending
            workouts.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            cardio.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            bodyweight.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            restDays.sort((a, b) => b.localeCompare(a));

            // 1. STREAK CALCULATION
            // Collect all unique activity dates (workouts, cardio & restDays)
            const activityDatesSet = new Set();
            workouts.forEach(w => { if (w.dateStr) activityDatesSet.add(w.dateStr); });
            cardio.forEach(c => { if (c.dateStr) activityDatesSet.add(c.dateStr); });
            restDays.forEach(d => { if (d) activityDatesSet.add(d); });

            const activityDates = Array.from(activityDatesSet).sort((a, b) => b.localeCompare(a));
            
            let streak = 0;
            if (activityDates.length > 0) {
                const latestActivityDate = activityDates[0];
                const daysSinceLatest = getDaysDifference(todayStr, latestActivityDate);
                
                // If latest activity was today or yesterday, the streak is alive
                if (daysSinceLatest <= 1) {
                    streak = 1;
                    let checkDate = new Date(latestActivityDate + 'T00:00:00');
                    
                    // Walk backwards counting consecutive days
                    while (true) {
                        checkDate.setDate(checkDate.getDate() - 1);
                        const checkDateStr = getLocalDateStr(checkDate);
                        if (activityDatesSet.has(checkDateStr)) {
                            streak++;
                        } else {
                            break;
                        }
                    }
                }
            }
            // Display streak
            const streakDisplay = document.getElementById("streak-display");
            streakDisplay.innerText = `${streak} ${streak === 1 ? 'day' : 'days'}${streak > 3 ? ' 🔥' : ''}`;

            // 2. LAST WORKOUT
            const workoutDisplay = document.getElementById("workout-display");
            
            // Check if rest day is the most recent day overall (latest rest day date >= latest workout & cardio date)
            const latestRestDayDate = restDays.length > 0 ? restDays[0] : null;
            const latestWorkoutDate = workouts.length > 0 ? workouts[0].dateStr : null;
            const latestCardioDate = cardio.length > 0 ? cardio[0].dateStr : null;
            
            const isRestDayMostRecent = latestRestDayDate && 
                (!latestWorkoutDate || latestRestDayDate >= latestWorkoutDate) && 
                (!latestCardioDate || latestRestDayDate >= latestCardioDate);
                
            if (workouts.length > 0) {
                const latestWorkout = workouts[0];
                const daysAgo = getDaysDifference(todayStr, latestWorkout.dateStr);
                
                if (daysAgo >= 3) {
                    if (isRestDayMostRecent) {
                        workoutDisplay.innerHTML = `<span class="workout-rest-text">Rest day 🛌</span>`;
                    } else {
                        workoutDisplay.innerHTML = `<span class="workout-rest-text">Taking a rest 😴</span>`;
                    }
                } else {
                    const musclesTrained = Array.isArray(latestWorkout.muscles) && latestWorkout.muscles.length > 0 
                        ? latestWorkout.muscles.join(" & ") 
                        : "General Workout";
                    workoutDisplay.innerText = `${musclesTrained} · ${formatDaysAgo(daysAgo)}`;
                }
            } else {
                if (isRestDayMostRecent) {
                    workoutDisplay.innerHTML = `<span class="workout-rest-text">Rest day 🛌</span>`;
                } else {
                    workoutDisplay.innerText = "No workouts logged";
                }
            }

            // 3. LAST RUN (or cardio)
            const runDisplay = document.getElementById("run-display");
            const runningWorkouts = cardio.filter(c => !c.cardioType || c.cardioType.toLowerCase().includes('run'));
            if (runningWorkouts.length > 0) {
                const latestRun = runningWorkouts[0];
                const daysAgo = getDaysDifference(todayStr, latestRun.dateStr);
                
                const distanceVal = parseFloat(latestRun.distanceKm) || 0;
                const durationVal = parseFloat(latestRun.durationMin) || 0;
                const paceStr = formatPace(durationVal, distanceVal);
                
                runDisplay.innerText = `${distanceVal.toFixed(1)} km · ${paceStr} · ${formatDaysAgo(daysAgo)}`;
            } else {
                runDisplay.innerText = "No runs logged yet";
            }

            // 4. CURRENT WEIGHT & DIFFERENCE
            const weightDisplay = document.getElementById("weight-display");
            const weightChartSub = document.getElementById("weight-chart-sub");
            if (bodyweight.length > 0) {
                const latestWeightEntry = bodyweight[0];
                const currentWeightVal = latestWeightEntry.weight;
                
                // Find weight closest to 30 days before latest entry date
                const latestWeightDate = new Date(latestWeightEntry.dateStr + 'T00:00:00');
                const target30DaysAgoDate = new Date(latestWeightDate);
                target30DaysAgoDate.setDate(latestWeightDate.getDate() - 30);
                const target30DaysAgoStr = getLocalDateStr(target30DaysAgoDate);
                
                let weight30DaysAgo = null;
                let minDiff = Infinity;
                
                bodyweight.forEach(w => {
                    const diff = Math.abs(getDaysDifference(w.dateStr, target30DaysAgoStr));
                    if (diff < minDiff) {
                        minDiff = diff;
                        weight30DaysAgo = w.weight;
                    }
                });

                let diffText = "";
                if (weight30DaysAgo !== null) {
                    const diff = currentWeightVal - weight30DaysAgo;
                    if (diff > 0) {
                        diffText = ` · +${diff.toFixed(1)} kg this month`;
                    } else if (diff < 0) {
                        // Use U+2212 minus sign
                        diffText = ` · −${Math.abs(diff).toFixed(1)} kg this month`;
                    } else {
                        diffText = ` · 0.0 kg this month`;
                    }
                }
                
                weightDisplay.innerText = `${currentWeightVal.toFixed(1)} kg${diffText}`;
                weightChartSub.innerText = `${currentWeightVal.toFixed(1)} kg`;
            } else {
                weightDisplay.innerText = "No bodyweight logged";
                weightChartSub.innerText = "— kg";
            }

            // 5. MUSCLE RECOVERY STRIP
            const targetMuscles = [
                { name: "Chest", target: 2 },
                { name: "Back", target: 3 },
                { name: "Shoulder", target: 2 },
                { name: "Bicep", target: 2 },
                { name: "Tricep", target: 2 },
                { name: "Legs", target: 3 },
                { name: "Forearm", target: 1 },
                { name: "Abs", target: 1 }
            ];

            const recoveryGrid = document.getElementById("recovery-grid-display");
            recoveryGrid.innerHTML = "";

            targetMuscles.forEach(m => {
                let lastTrainedDateStr = null;
                for (const w of workouts) {
                    if (Array.isArray(w.muscles)) {
                        const containsMuscle = w.muscles.some(dbMuscle => matchesMuscle(dbMuscle, m.name));
                        if (containsMuscle) {
                            lastTrainedDateStr = w.dateStr;
                            break;
                        }
                    }
                }

                let daysSinceTrained = Infinity;
                if (lastTrainedDateStr) {
                    daysSinceTrained = getDaysDifference(todayStr, lastTrainedDateStr);
                }

                const daysLeftToRecover = m.target - daysSinceTrained;
                const isReady = daysLeftToRecover <= 0;

                const muscleEl = document.createElement("div");
                muscleEl.className = "muscle-item";

                let statusBadgeHTML = "";
                if (isReady) {
                    statusBadgeHTML = `<span class="muscle-status ready">Ready to train</span>`;
                } else {
                    const daysLeftStr = daysLeftToRecover === 1 ? "1d left" : `${daysLeftToRecover}d left`;
                    statusBadgeHTML = `<span class="muscle-status recovering">Recovering (${daysLeftStr})</span>`;
                }

                muscleEl.innerHTML = `
                    <span class="muscle-name">${m.name}</span>
                    ${statusBadgeHTML}
                `;
                recoveryGrid.appendChild(muscleEl);
            });

            // 6. WEIGHT TREND LINE CHART (last 60 entries)
            const weightChartData = [...bodyweight].slice(0, 60).reverse();
            const weightLabels = weightChartData.map(w => {
                const [y, m, d] = w.dateStr.split('-').map(Number);
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                return `${months[m - 1]} ${d}`;
            });
            const weightValues = weightChartData.map(w => w.weight);
            renderWeightChart(weightLabels, weightValues);

            // 7. CARDIO CHART (weekly running, last 12 weeks)
            const cardioChartSub = document.getElementById("cardio-chart-sub");
            const runningThisMonthKm = getRunningThisMonthDistance(cardio, todayStr);
            cardioChartSub.innerText = `${runningThisMonthKm.toFixed(1)} km this month`;

            const hasCardio = runningWorkouts.length > 0;
            const wrapper = document.getElementById("cardio-chart-wrapper");
            
            if (!hasCardio) {
                wrapper.innerHTML = `
                    <div class="cardio-placeholder">
                        <span class="cardio-placeholder-icon">🏃‍♂️</span>
                        <span class="cardio-placeholder-text">No runs logged yet</span>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `<canvas id="cardioChart"></canvas>`;
                
                const weeks = getWeeklyIntervals(new Date());
                
                runningWorkouts.forEach(c => {
                    const [y, m, d] = c.dateStr.split('-').map(Number);
                    const runDate = new Date(y, m - 1, d);
                    
                    for (const week of weeks) {
                        if (runDate >= week.start && runDate <= week.end) {
                            week.distance += (parseFloat(c.distanceKm) || 0);
                            break;
                        }
                    }
                });

                const cardioLabels = weeks.map(w => w.label);
                const cardioValues = weeks.map(w => w.distance);
                renderCardioChart(cardioLabels, cardioValues);
            }

            // 8. GYM PHOTO SECTION
            const photoCard = document.getElementById("photo-card");
            const gymPhoto = document.getElementById("gym-photo");
            const photoLabel = document.getElementById("photo-label");
            
            if (latestPhoto) {
                photoCard.style.display = "block";
                
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = getLocalDateStr(yesterday);
                
                let labelText = "";
                if (latestPhoto.dateStr === todayStr) {
                    labelText = "📸 Today";
                } else if (latestPhoto.dateStr === yesterdayStr) {
                    labelText = "📸 Yesterday";
                } else {
                    const daysDiff = getDaysDifference(todayStr, latestPhoto.dateStr);
                    labelText = `📸 ${daysDiff} ${daysDiff === 1 ? 'day' : 'days'} ago`;
                }
                photoLabel.innerText = labelText;
                
                // Only set src with 100ms delay for performance
                setTimeout(() => {
                    let srcVal = latestPhoto.base64;
                    if (!srcVal.startsWith("data:")) {
                        srcVal = "data:image/jpeg;base64," + srcVal;
                    }
                    gymPhoto.src = srcVal;
                }, 100);
            } else {
                photoCard.style.display = "none";
                gymPhoto.src = "";
            }
        }

        function getRunningThisMonthDistance(cardio, todayStr) {
            const [todayYear, todayMonth] = todayStr.split('-').map(Number);
            
            const runningThisMonth = cardio.filter(c => {
                const isRun = !c.cardioType || c.cardioType.toLowerCase().includes('run');
                if (!isRun) return false;
                const [y, m, d] = c.dateStr.split('-').map(Number);
                return y === todayYear && m === todayMonth;
            });
            
            return runningThisMonth.reduce((sum, c) => sum + (parseFloat(c.distanceKm) || 0), 0);
        }

        function getWeeklyIntervals(todayDate = new Date()) {
            const intervals = [];
            const currentDay = todayDate.getDay();
            const distanceToMonday = currentDay === 0 ? 6 : currentDay - 1;
            const thisMonday = new Date(todayDate);
            thisMonday.setDate(todayDate.getDate() - distanceToMonday);
            thisMonday.setHours(0,0,0,0);

            for (let i = 11; i >= 0; i--) {
                const start = new Date(thisMonday);
                start.setDate(thisMonday.getDate() - i * 7);
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                end.setHours(23, 59, 59, 999);
                
                intervals.push({
                    start,
                    end,
                    label: formatDateLabel(start),
                    distance: 0
                });
            }
            return intervals;
        }

        function formatDateLabel(date) {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[date.getMonth()]} ${date.getDate()}`;
        }

        function renderWeightChart(labels, data) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            if (weightChartInstance) {
                weightChartInstance.destroy();
            }

            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, 'rgba(226, 114, 42, 0.2)');
            gradient.addColorStop(1, 'rgba(226, 114, 42, 0.00)');

            weightChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#E2722A',
                        borderWidth: 2.5,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.35,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: '#E2722A',
                        pointHoverBorderColor: '#FFFFFF',
                        pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1B2128',
                            titleFont: { family: 'Space Grotesk', size: 12 },
                            bodyFont: { family: 'Inter', size: 12 },
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y.toFixed(1)} kg`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { family: 'Inter', size: 10 },
                                color: '#6C727A',
                                maxTicksLimit: 6
                            }
                        },
                        y: {
                            grid: { color: 'rgba(27, 33, 40, 0.04)' },
                            ticks: {
                                font: { family: 'Inter', size: 10 },
                                color: '#6C727A',
                                maxTicksLimit: 5
                            }
                        }
                    }
                }
            });
        }

        function renderCardioChart(labels, data) {
            const ctx = document.getElementById('cardioChart').getContext('2d');
            
            if (cardioChartInstance) {
                cardioChartInstance.destroy();
            }

            cardioChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: '#1F9E83',
                        hoverBackgroundColor: '#177F69',
                        borderRadius: 5,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1B2128',
                            titleFont: { family: 'Space Grotesk', size: 12 },
                            bodyFont: { family: 'Inter', size: 12 },
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y.toFixed(1)} km`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { family: 'Inter', size: 10 },
                                color: '#6C727A',
                                maxTicksLimit: 6
                            }
                        },
                        y: {
                            grid: { color: 'rgba(27, 33, 40, 0.04)' },
                            ticks: {
                                font: { family: 'Inter', size: 10 },
                                color: '#6C727A',
                                maxTicksLimit: 5
                            }
                        }
                    }
                }
            });
        }

        function updateTimeElapsed() {
            const textEl = document.getElementById("update-time-text");
            if (!lastUpdatedTime) {
                textEl.innerText = "Connecting...";
                return;
            }
            const diffMs = new Date() - lastUpdatedTime;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) {
                textEl.innerText = "Updated just now";
            } else if (diffMins === 1) {
                textEl.innerText = "Updated 1 min ago";
            } else {
                textEl.innerText = `Updated ${diffMins} mins ago`;
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 180000);
        setInterval(updateTimeElapsed, 10000);
    </script>
</body>
</html>
