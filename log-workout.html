<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Log Workout — Ironlog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F2EC">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div>
    <div class="wordmark"><span class="dot"></span>Ironlog</div>
    <div class="page-eyebrow">Log workout</div>
  </div>
  <div class="user-chip" id="userChip"></div>
</header>

<div class="app-shell">
<main>

  <section>
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label for="dateInput">Date</label>
          <input type="date" id="dateInput">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="startTime">Start time</label>
          <input type="time" id="startTime">
        </div>
        <div class="field">
          <label for="endTime">End time</label>
          <input type="time" id="endTime">
        </div>
      </div>
      <div class="label" id="durationLabel" style="margin-top:-6px;">Duration: —</div>
    </div>
  </section>

  <section>
    <div class="section-head"><h2>Muscles trained</h2></div>
    <div id="muscleChips" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
  </section>

  <section>
    <div class="section-head"><h2>Exercises</h2></div>
    <div class="card mt-8" style="margin-bottom:16px;">
      <div class="field-row" style="align-items:flex-end;">
        <div class="field" style="margin-bottom:0;">
          <label for="exerciseSelect">Add exercise</label>
          <select id="exerciseSelect"></select>
        </div>
        <button class="btn btn-primary" id="addExerciseBtn" style="margin-bottom:0;">Add</button>
      </div>
    </div>
    <div id="exerciseList"></div>
    <div class="empty" id="noExercises">
      <div class="big">No exercises added yet</div>
      Pick one from the dropdown above to get started.
    </div>
  </section>

  <section>
    <button class="btn btn-primary btn-block" id="saveBtn" style="padding:16px;font-size:16px;">Save workout</button>
  </section>

</main>
</div>

<nav class="tabbar">
  <a href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="log-workout.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M2 10v4M22 10v4M6 12h12"/></svg>
    Train
  </a>
  <a href="log-cardio.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
    Cardio
  </a>
  <a href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Calendar
  </a>
  <a href="stats.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    Stats
  </a>
</nav>

<script type="module" src="js/log-workout.js"></script>
</body>
</html>
