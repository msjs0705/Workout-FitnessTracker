<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stats — Ironlog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F2EC">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="topbar">
  <div>
    <div class="wordmark"><span class="dot"></span>Ironlog</div>
    <div class="page-eyebrow">Stats</div>
  </div>
  <div class="user-chip" id="userChip"></div>
</header>

<div class="app-shell">
<main>

  <section>
    <div class="section-head"><h2>Consistency</h2><span class="label" id="streakLabel"></span></div>
    <div class="card">
      <div class="heatmap" id="heatmap"></div>
      <div class="label mt-8">Last 14 weeks · darker = both strength &amp; cardio that day</div>
    </div>
  </section>

  <section>
    <div class="section-head"><h2>Cardio distance</h2><span class="label">per week, km</span></div>
    <div class="card"><canvas id="cardioChart" height="180"></canvas></div>
  </section>

  <section>
    <div class="section-head"><h2>Muscle split</h2><span class="label">times trained, all-time</span></div>
    <div class="card" style="display:flex;align-items:center;justify-content:center;">
      <div style="max-width:280px;width:100%;"><canvas id="muscleChart"></canvas></div>
    </div>
  </section>
  
  <section>
    <div class="section-head"><h2>Personal records</h2><span class="label">heaviest set logged</span></div>
    <div class="card" id="prList" style="padding:6px 14px;">
      <div class="muted center" style="padding:18px 0;">Loading…</div>
    </div>
  </section>

</main>
</div>

<nav class="tabbar">

    Home
  </a>
  <a href="log-workout.html">

    Train
  </a>
  <a href="log-cardio.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
    Cardio
  </a>
  <a href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Calendar
  </a>
  <a href="stats.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    Stats
  </a>
</nav>

<script type="module" src="js/stats.js"></script>
</body>
</html>
