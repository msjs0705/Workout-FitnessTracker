<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Log Cardio — Ironlog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F2EC">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div>
    <div class="wordmark"><span class="dot"></span>Ironlog</div>
    <div class="page-eyebrow">Log cardio</div>
  </div>
  <div class="user-chip" id="userChip"></div>
</header>

<div class="app-shell">
<main>

  <section>
    <div class="card">
      <div class="field">
        <label for="cardioType">Activity</label>
        <select id="cardioType">
          <option>Running</option>
          <option>Cycling</option>
          <option>Walking</option>
          <option>Swimming</option>
          <option>Rowing</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="duration">Duration (min)</label>
          <input type="number" inputmode="decimal" id="duration" placeholder="30">
        </div>
        <div class="field">
          <label for="distance">Distance (km)</label>
          <input type="number" inputmode="decimal" id="distance" placeholder="5.0" step="0.01">
        </div>
      </div>
      <div class="label" id="speedLabel">Pace / speed: —</div>
    </div>
  </section>

  <section>
    <button class="btn btn-teal btn-block" id="saveBtn" style="padding:16px;font-size:16px;">Save cardio session</button>
  </section>

  <section>
    <div class="section-head">
      <h2>Recent sessions</h2>
    </div>
    <div class="card" id="recentCardio" style="padding:6px 14px;">
      <div class="muted center" style="padding:18px 0;">Loading…</div>
    </div>
  </section>

</main>
</div>

<nav class="tabbar">
  <a href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="log-workout.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M2 10v4M22 10v4M6 12h12"/></svg>
    Train
  </a>
  <a href="log-cardio.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
    Cardio
  </a>
  <a href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Calendar
  </a>
  <a href="stats.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    Stats
  </a>
</nav>

<script type="module" src="js/log-cardio.js"></script>
</body>
</html>
