<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in — Ironlog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2128">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="wordmark"><span style="color:var(--amber)">●</span> Ironlog</div>
    <p class="sub">Your gym log, cardio, and bodyweight — synced everywhere.</p>

    <button type="button" class="btn btn-block" id="googleBtn" style="background:#fff;color:#1C2024;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 7 29.6 5 24 5c-7.6 0-14.1 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 35.4 26.9 36 24 36c-5.3 0-9.6-3.3-11.2-8l-6.6 5.1C9.8 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.5l6.6 5.4C39.9 36.6 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Continue with Google
    </button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <div style="flex:1;height:1px;background:var(--navy-line);"></div>
      <span style="color:var(--on-navy-soft);font-size:11px;font-family:var(--font-mono);text-transform:uppercase;">or</span>
      <div style="flex:1;height:1px;background:var(--navy-line);"></div>
    </div>

    <div class="auth-tabs">
      <button id="tabSignIn" class="active">Sign in</button>
      <button id="tabSignUp">Create account</button>
    </div>

    <form id="authForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign in</button>
      <div class="auth-error" id="authError"></div>
    </form>
  </div>
</div>

<script type="module">
  import { auth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    GoogleAuthProvider, signInWithPopup } from "./js/firebase-init.js";

  // Already signed in? skip straight to dashboard.
  onAuthStateChanged(auth, (user) => { if (user) window.location.href = "index.html"; });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
      window.location.href = "index.html";
    } catch (err) {
      if (err.code !== "auth/popup-closed-by-user") {
        document.getElementById("authError").textContent = humanizeError(err.code);
      }
    }
  });

  let mode = "signin";
  const tabSignIn = document.getElementById("tabSignIn");
  const tabSignUp = document.getElementById("tabSignUp");
  const submitBtn = document.getElementById("submitBtn");
  const errEl = document.getElementById("authError");

  tabSignIn.addEventListener("click", () => { mode = "signin"; tabSignIn.classList.add("active"); tabSignUp.classList.remove("active"); submitBtn.textContent = "Sign in"; errEl.textContent=""; });
  tabSignUp.addEventListener("click", () => { mode = "signup"; tabSignUp.classList.add("active"); tabSignIn.classList.remove("active"); submitBtn.textContent = "Create account"; errEl.textContent=""; });

  document.getElementById("authForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";
    submitBtn.disabled = true;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    try {
      if (mode === "signin") {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        await createUserWithEmailAndPassword(auth, email, password);
      }
      window.location.href = "index.html";
    } catch (err) {
      errEl.textContent = humanizeError(err.code);
      submitBtn.disabled = false;
    }
  });

  function humanizeError(code){
    const map = {
      "auth/invalid-email": "That email doesn't look right.",
      "auth/user-not-found": "No account with that email — try Create account.",
      "auth/wrong-password": "Wrong password.",
      "auth/invalid-credential": "Email or password is incorrect.",
      "auth/email-already-in-use": "That email already has an account — try Sign in.",
      "auth/weak-password": "Password needs at least 6 characters.",
      "auth/unauthorized-domain": "This site's domain isn't authorized for Google sign-in yet — add it under Firebase Console → Authentication → Settings → Authorized domains.",
      "auth/operation-not-allowed": "Google sign-in isn't enabled yet — turn it on in Firebase Console → Authentication → Sign-in method.",
      "auth/account-exists-with-different-credential": "An account already exists with this email using a different sign-in method.",
    };
    return map[code] || "Something went wrong. Try again.";
  }
</script>
</body>
</html>
