<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Calendar — Ironlog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4F2EC">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div>
    <div class="wordmark"><span class="dot"></span>Ironlog</div>
    <div class="page-eyebrow">Calendar</div>
  </div>
  <div class="user-chip" id="userChip"></div>
</header>

<div class="app-shell">
<main>

  <section>
    <div class="cal-nav">
      <button id="prevMonth">←</button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button id="nextMonth">→</button>
    </div>
    <div class="cal-grid" id="calDow"></div>
    <div class="cal-grid mt-8" id="calDays"></div>
    <div style="display:flex;gap:16px;margin-top:14px;">
      <span class="label"><span class="dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:5px;"></span>Strength</span>
      <span class="label"><span class="dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--teal);margin-right:5px;"></span>Cardio</span>
    </div>
  </section>

  <section class="day-detail" id="dayDetail" style="display:none;">
    <div class="section-head"><h2 id="dayDetailTitle">—</h2></div>
    <div id="dayDetailBody"></div>
  </section>

</main>
</div>

<nav class="tabbar">
  <a href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="log-workout.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M2 10v4M22 10v4M6 12h12"/></svg>
    Train
  </a>
  <a href="log-cardio.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
    Cardio
  </a>
  <a href="calendar.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Calendar
  </a>
  <a href="stats.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    Stats
  </a>
</nav>

<script type="module" src="js/calendar.js"></script>
</body>
</html>
